<style>
  :root{ --bg:#F6F1E4; --surface:#FFFFFF; --ocean-deep:#0E4A57; --ocean:#1B8A9B; --ocean-light:#CDE8E8; --coral:#E2593F; --ink:#1D2B2C; --ink-soft:#5B6B69; --line:#DCD2B8; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: rgba(27,138,155,0.25); }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Noto Sans TC',sans-serif; padding:24px 16px 90px; }
  .wrap{ max-width:720px; margin:0 auto; }
  h1{ font-family:'Noto Serif TC',serif; font-weight:900; font-size:24px; color:var(--ocean-deep); margin:0 0 4px; }
  .sub{ font-size:12.5px; color:var(--ink-soft); margin:0 0 18px; }
  .ro-radio{ position:absolute; opacity:0; width:1px; height:1px; pointer-events:none; }
  .ro-day{ display:none; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:18px; }
  .ro-empty{ text-align:center; color:var(--ink-soft); padding:30px 0; font-size:13.5px; margin:0; }
  .ro-stop{ display:grid; grid-template-columns:60px 20px 1fr; gap:4px 10px; align-items:center; margin-bottom:4px; }
  .ro-time{ font-size:12.5px; font-weight:700; color:var(--ocean-deep); text-align:center; }
  .ro-dotcol{ display:flex; flex-direction:column; align-items:center; height:100%; min-height:50px; }
  .ro-dot{ width:11px; height:11px; border-radius:50%; background:var(--ocean); border:2px solid #fff; box-shadow:0 0 0 2px var(--ocean); margin-top:6px; flex-shrink:0; }
  .ro-thread{ width:2px; flex:1; background:var(--line); margin-top:2px; }
  .ro-stop:last-child .ro-thread{ background:transparent; }
  .ro-card{ background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:14px; font-weight:500; display:flex; align-items:center; justify-content:space-between; gap:8px; text-decoration:none; color:var(--ink); }
  .ro-card:active{ background:var(--ocean-light); border-color:var(--ocean); }
  .ro-card svg{ width:15px; height:15px; color:var(--coral); flex-shrink:0; opacity:.8; }
  footer{ text-align:center; font-size:11.5px; color:var(--ink-soft); margin-top:16px; }

  .ro-tabbar{
    display:flex; gap:4px; margin-top:18px;
    padding:8px; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    position:sticky; bottom:12px; box-shadow:0 4px 16px rgba(14,74,87,0.12);
  }
  .ro-tab{
    flex:1; text-align:center;
    font-family:'Noto Serif TC',serif; font-weight:700; font-size:12.5px;
    padding:10px 4px; color:var(--ink-soft); border-radius:10px; cursor:pointer;
    -webkit-user-select:none; user-select:none;
  }
  .ro-tab .ro-en{ display:block; font-family:'Noto Sans TC',sans-serif; font-weight:400; font-size:8.5px; letter-spacing:1px; margin-top:1px; }
  #roday0:checked ~ .ro-content #ro-day-0{ display:block; }
  #roday1:checked ~ .ro-content #ro-day-1{ display:block; }
  #roday2:checked ~ .ro-content #ro-day-2{ display:block; }
  #roday3:checked ~ .ro-content #ro-day-3{ display:block; }
  #roday4:checked ~ .ro-content #ro-day-4{ display:block; }
  #roday0:checked ~ .ro-tabbar label[for="roday0"]{ background:var(--ocean-deep); color:#fff; }
  #roday1:checked ~ .ro-tabbar label[for="roday1"]{ background:var(--ocean-deep); color:#fff; }
  #roday2:checked ~ .ro-tabbar label[for="roday2"]{ background:var(--ocean-deep); color:#fff; }
  #roday3:checked ~ .ro-tabbar label[for="roday3"]{ background:var(--ocean-deep); color:#fff; }
  #roday4:checked ~ .ro-tabbar label[for="roday4"]{ background:var(--ocean-deep); color:#fff; }
</style>
</head>
